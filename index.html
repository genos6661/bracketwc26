<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="World Cup 2026 Knockout Bracket — Build your prediction" />
  <title>WC 2026 · Bracket Predictor</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- html2canvas (optional, for PNG export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
</head>

<body>
  <div class="page">

    <!-- ── Header ──────────────────────────────────────────── -->
    <header class="site-header" role="banner">

      <div class="header-brand">
        <span class="brand-badge" aria-hidden="true">FIFA</span>
        <div>
          <span class="brand-title">World Cup 2026</span>
          <span class="brand-sub"> · Knockout Bracket</span>
        </div>
      </div>

      <!-- Legend -->
      <div class="header-legend" aria-label="Legend">
        <span class="legend-item">
          <span class="legend-dot primary"></span>
          Click to pick winner
        </span>
        <span class="legend-item">
          <span class="legend-dot winner"></span>
          Advanced
        </span>
      </div>

      <!-- Toolbar -->
      <nav class="toolbar" aria-label="Bracket actions">
        <button id="btn-reset" class="btn btn-danger" aria-label="Reset bracket">
          <span class="btn-icon" aria-hidden="true">↺</span>
          <span class="btn-label">Reset</span>
        </button>
        <button id="btn-import-json" class="btn btn-ghost" aria-label="Import JSON prediction">
          <span class="btn-icon" aria-hidden="true">⬆</span>
          <span class="btn-label">Import</span>
        </button>
        <button id="btn-export-json" class="btn btn-ghost" aria-label="Export JSON prediction">
          <span class="btn-icon" aria-hidden="true">⬇</span>
          <span class="btn-label">Export JSON</span>
        </button>
        <button id="btn-export-png" class="btn btn-primary" aria-label="Export bracket as PNG image">
          <span class="btn-icon" aria-hidden="true">🖼</span>
          <span class="btn-label">Export PNG</span>
        </button>
      </nav>

    </header>

    <!-- ── Bracket ─────────────────────────────────────────── -->
    <main class="bracket-scroll" role="main" aria-label="Knockout bracket predictor">
      <div id="bracket-root" aria-live="polite" aria-label="Bracket"></div>
    </main>

  </div>

  <!-- ES6 Module entry point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
